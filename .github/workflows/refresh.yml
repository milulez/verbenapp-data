name: Refrescar verbenas (scrape ODG)

on:
  schedule:
    - cron: '0 5 * * *'      # cada día 05:00 UTC (07:00 Madrid verano)
  workflow_dispatch: {}        # botón manual "Run workflow"

permissions:
  contents: write              # para commitear el JSON regenerado

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # cachea las páginas de detalle/formación (caras: ~2300). Los fetchers saltan las ya bajadas
      # -> a diario solo descarga los bolos NUEVOS. Las ventanas de actuaciones se rebajan siempre frescas.
      - name: Restaurar caché ODG
        uses: actions/cache@v4
        with:
          path: |
            /tmp/odg_det
            /tmp/odg_form
          key: odg-cache-${{ github.run_id }}
          restore-keys: odg-cache-

      - name: Ejecutar pipeline
        env:
          VERBEN_DIR: ${{ github.workspace }}
        run: bash run-pipeline.sh

      - name: Commit datos si cambiaron
        run: |
          git config user.name  "verbenapp-bot"
          git config user.email "bot@users.noreply.github.com"
          git add verbenas.json orquestas.json actuaciones.json actuaciones-galicia.json actuaciones-detalle.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "data: refresco automático $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main || true
            git push
          fi
